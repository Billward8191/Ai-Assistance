<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Assistance</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    min-height:100dvh;

    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.55)
    ),
    url("images/backgroung.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.card{

    width:100%;
    max-width:750px;

    background:rgba(0,0,0,0.75);

    backdrop-filter:blur(10px);

    border-radius:18px;

    padding:30px;

    color:white;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{

    font-size:36px;

    margin-bottom:10px;
}

.subtitle{

    font-size:18px;

    margin-bottom:25px;

    opacity:0.9;
}

button{

    padding:15px 28px;

    font-size:18px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);
}

video{

    width:100%;

    margin-top:20px;

    border-radius:12px;

    background:black;

    min-height:250px;
}

#status{

    margin-top:15px;

    font-size:16px;

    color:#ffffff;
}

@media(max-width:768px){

    .card{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    .subtitle{
        font-size:16px;
    }

    button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>AI Assistance</h1>

    <div class="subtitle">
        Secure Screen Sharing Support
    </div>

    <button id="shareBtn">
        Share My Screen
    </button>

    <div id="status"></div>

    <video
        id="localVideo"
        autoplay
        muted
        playsinline>
    </video>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
